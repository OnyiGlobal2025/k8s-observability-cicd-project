name: CI/CD - Build, Scan, Push, Deploy (Local)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: onyiglobal/observability-app

jobs:
  build-scan-push-deploy:
    runs-on: self-hosted

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          echo Building image %IMAGE_NAME%
          docker build -f app/Dockerfile ^
            -t %IMAGE_NAME%:%GITHUB_SHA% ^
            -t %IMAGE_NAME%:latest ^
            app

      - name: Run Trivy scan (Report Only)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Push image to Docker Hub
        run: |
          docker push %IMAGE_NAME%:%GITHUB_SHA%
          docker push %IMAGE_NAME%:latest

      - name: Deploy Locally (CD Step)
        run: |
          echo Deploying container...
          docker stop observability-app >nul 2>&1
          docker rm observability-app >nul 2>&1
          docker pull %IMAGE_NAME%:latest
          docker run -d -p 5000:5000 --name observability-app %IMAGE_NAME%:latest